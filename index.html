<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>VIP Transfer | Lüks ve Konforlu Yolculuk</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "stitch-dark": "#0B0C10",
                        "stitch-card": "#15171C",
                        "stitch-gold": "#C5A880",
                        "stitch-gold-hover": "#E5C8A0",
                        "stitch-text-muted": "#9A9DA5"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0C10;
            color: #FFFFFF;
        }
        .stitch-border {
            border: 1px solid rgba(197, 168, 128, 0.15);
        }
        .stitch-border-focus:focus {
            border-color: #C5A880;
            outline: none;
            box-shadow: 0 0 0 2px rgba(197, 168, 128, 0.2);
        }
    </style>
</head>
<body class="font-sans antialiased">

    <div id="root"></div>

    <!-- Firebase SDK Modülleri -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC8JHwiUcHlJpoiFewsaCzSBRS8SFU-A48",
            authDomain: "viptransfer-65c5e.firebaseapp.com",
            projectId: "viptransfer-65c5e",
            storageBucket: "viptransfer-65c5e.firebasestorage.app",
            messagingSenderId: "279013861180",
            appId: "1:279013861180:web:2193543a98d147a1e42039",
            measurementId: "G-24V8G9KF3B"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.FirebaseBridge = { auth, db, signInWithEmailAndPassword, signOut, onAuthStateChanged, doc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc };
    </script>

    <!-- React Uygulama Mantığı -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('home'); 
            const [user, setUser] = useState(null);
            const [vehicles, setVehicles] = useState([]);
            const [settings, setSettings] = useState({ phone: '0544 518 73 99', whatsapp: '0544 518 73 99' }); 
            const [loading, setLoading] = useState(true);

            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            const [editingVehicle, setEditingVehicle] = useState(null);
            const [vehName, setVehName] = useState('');
            const [vehImg, setVehImg] = useState('');
            const [vehDesc, setVehDesc] = useState('');

            useEffect(() => {
                const handleHashChange = () => {
                    if (window.location.hash === '#/admin') {
                        if (user) setView('admin-panel');
                        else setView('admin-login');
                    } else {
                        setView('home');
                    }
                };
                window.addEventListener('hashchange', handleHashChange);
                handleHashChange();
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, [user]);

            useEffect(() => {
                const checkBridge = setInterval(() => {
                    if (window.FirebaseBridge) {
                        clearInterval(checkBridge);
                        const { auth, db, onAuthStateChanged, collection, onSnapshot, doc } = window.FirebaseBridge;

                        onAuthStateChanged(auth, (currentUser) => {
                            if (currentUser && currentUser.email.includes('@admin')) {
                                setUser(currentUser);
                                if (window.location.hash === '#/admin') setView('admin-panel');
                            } else {
                                setUser(null);
                                if (window.location.hash === '#/admin') setView('admin-login');
                            }
                        });

                        onSnapshot(collection(db, "vehicles"), (snapshot) => {
                            const list = [];
                            snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                            setVehicles(list);
                        });

                        onSnapshot(doc(db, "settings", "contact"), (docSnap) => {
                            if (docSnap.exists()) {
                                setSettings(docSnap.data());
                            }
                        });

                        setLoading(false);
                    }
                }, 100);
            }, []);

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                const emailInput = loginEmail.trim().toLowerCase();
                if (!emailInput.includes('admin')) {
                    setLoginError('Yetkili bir @admin hesabı girmelisiniz.');
                    return;
                }
                try {
                    const { auth, signInWithEmailAndPassword } = window.FirebaseBridge;
                    await signInWithEmailAndPassword(auth, emailInput, loginPassword);
                } catch (err) {
                    setLoginError('Hatalı e-posta veya şifre.');
                }
            };

            const handleLogout = async () => {
                const { auth, signOut } = window.FirebaseBridge;
                await signOut(auth);
                window.location.hash = '';
                setView('home');
            };

            const saveVehicle = async (e) => {
                e.preventDefault();
                const { db, collection, addDoc, doc, updateDoc } = window.FirebaseBridge;
                const data = { name: vehName, image: vehImg, description: vehDesc };

                if (editingVehicle) {
                    await updateDoc(doc(db, "vehicles", editingVehicle.id), data);
                    setEditingVehicle(null);
                } else {
                    await addDoc(collection(db, "vehicles"), data);
                }
                setVehName(''); setVehImg(''); setVehDesc('');
            };

            const deleteVehicle = async (id) => {
                if (confirm('Bu aracı silmek istediğinize emin misiniz?')) {
                    const { db, doc, deleteDoc } = window.FirebaseBridge;
                    await deleteDoc(doc(db, "vehicles", id));
                }
            };

            const saveContact = async (e) => {
                e.preventDefault();
                const { db, doc, setDoc } = window.FirebaseBridge;
                await setDoc(doc(db, "settings", "contact"), settings);
                alert('Numaralar başarıyla güncellendi!');
            };

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-stitch-dark">
                        <div className="text-center">
                            <i className="fa-solid fa-spinner animate-spin text-4xl text-stitch-gold mb-4"></i>
                            <p className="font-montserrat tracking-widest text-sm text-stitch-text-muted">YÜKLENİYOR...</p>
                        </div>
                    </div>
                );
            }

            if (view === 'admin-login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-stitch-dark">
                        <div className="w-full max-w-md bg-stitch-card stitch-border rounded-xl p-8 shadow-2xl">
                            <h2 className="text-2xl font-black font-montserrat text-center text-stitch-gold tracking-wide mb-2">YÖNETİCİ GİRİŞİ</h2>
                            <p className="text-xs text-center text-stitch-text-muted mb-6 uppercase tracking-widest">Sadece @admin yetkilileri erişebilir</p>
                            
                            {loginError && <div className="bg-red-900/30 border border-red-500 text-red-200 p-3 rounded-lg text-xs text-center mb-4">{loginError}</div>}
                            
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-xs font-bold text-stitch-gold uppercase mb-2">E-Posta Adresi</label>
                                    <input type="email" required className="w-full bg-stitch-dark border border-neutral-800 text-white rounded-lg px-4 py-3 text-sm stitch-border-focus" placeholder="isim@admin" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-stitch-gold uppercase mb-2">Şifre</label>
                                    <input type="password" required className="w-full bg-stitch-dark border border-neutral-800 text-white rounded-lg px-4 py-3 text-sm stitch-border-focus" placeholder="••••••••" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} />
                                </div>
                                <button type="submit" className="w-full bg-stitch-gold hover:bg-stitch-gold-hover text-black font-bold py-3 px-4 rounded-lg text-sm font-montserrat tracking-wider transition-all">GİRİŞ YAP</button>
                            </form>
                        </div>
                    </div>
                );
            }

            if (view === 'admin-panel') {
                return (
                    <div className="min-h-screen bg-stitch-dark flex flex-col">
                        <header className="bg-stitch-card border-b border-neutral-800 py-4 px-6 flex justify-between items-center">
                            <div>
                                <h1 className="text-lg font-black font-montserrat tracking-wider text-stitch-gold">VIP TRANSFER PANEL</h1>
                                <p className="text-xs text-stitch-text-muted">Aktif Oturum: {user?.email}</p>
                            </div>
                            <button onClick={handleLogout} className="bg-red-600/20 hover:bg-red-600 text-red-200 hover:text-white border border-red-600/40 text-xs font-bold px-4 py-2 rounded-lg transition-all flex items-center gap-2">
                                <i className="fa-solid fa-right-from-bracket"></i> ÇIKIŞ
                            </button>
                        </header>

                        <div className="flex-1 max-w-6xl w-full mx-auto p-4 md:p-8 grid grid-cols-1 md:grid-cols-3 gap-8">
                            <div className="bg-stitch-card stitch-border p-6 rounded-xl h-fit">
                                <h3 className="text-sm font-bold font-montserrat text-stitch-gold uppercase border-b border-neutral-800 pb-3 mb-4">
                                    {editingVehicle ? 'Aracı Düzenle' : 'Yeni Araç Ekle'}
                                </h3>
                                <form onSubmit={saveVehicle} className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-semibold text-stitch-text-muted uppercase mb-1">Araç Adı</label>
                                        <input type="text" required className="w-full bg-stitch-dark border border-neutral-800 text-white text-sm rounded-lg px-3 py-2 stitch-border-focus" placeholder="MERCEDES TRANSPORTER VIP" value={vehName} onChange={e => setVehName(e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-stitch-text-muted uppercase mb-1">Görsel Bağlantısı (URL)</label>
                                        <input type="url" required className="w-full bg-stitch-dark border border-neutral-800 text-white text-sm rounded-lg px-3 py-2 stitch-border-focus" placeholder="https://site.com/arac.jpg" value={vehImg} onChange={e => setVehImg(e.target.value)} />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-semibold text-stitch-text-muted uppercase mb-1">Özellikler (Satır satır yazın)</label>
                                        <textarea required rows="4" className="w-full bg-stitch-dark border border-neutral-800 text-white text-sm rounded-lg px-3 py-2 stitch-border-focus" placeholder="Siyah Dış Tasarım&#10;VIP İç Dizayn" value={vehDesc} onChange={e => setVehDesc(e.target.value)}></textarea>
                                    </div>
                                    <div className="flex gap-2">
                                        <button type="submit" className="flex-1 bg-stitch-gold hover:bg-stitch-gold-hover text-black text-xs font-bold py-2.5 rounded-lg uppercase tracking-wider transition-all">
                                            {editingVehicle ? 'Güncelle' : 'Kaydet'}
                                        </button>
                                        {editingVehicle && (
                                            <button type="button" onClick={() => { setEditingVehicle(null); setVehName(''); setVehImg(''); setVehDesc(''); }} className="bg-neutral-800 text-white text-xs px-3 rounded-lg">İptal</button>
                                        )}
                                    </div>
                                </form>
                            </div>

                            <div className="md:col-span-2 space-y-8">
                                <div className="bg-stitch-card stitch-border p-6 rounded-xl">
                                    <h3 className="text-sm font-bold font-montserrat text-stitch-gold uppercase border-b border-neutral-800 pb-3 mb-4">Numara Güncelleme</h3>
                                    <form onSubmit={saveContact} className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-xs font-semibold text-stitch-text-muted uppercase mb-1">Telefon Numarası</label>
                                            <input type="text" className="w-full bg-stitch-dark border border-neutral-800 text-white text-sm rounded-lg px-3 py-2 stitch-border-focus" value={settings.phone} onChange={e => setSettings({...settings, phone: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-xs font-semibold text-stitch-text-muted uppercase mb-1">WhatsApp Numarası</label>
                                            <input type="text" className="w-full bg-stitch-dark border border-neutral-800 text-white text-sm rounded-lg px-3 py-2 stitch-border-focus" value={settings.whatsapp} onChange={e => setSettings({...settings, whatsapp: e.target.value})} />
                                        </div>
                                        <div className="sm:col-span-2 text-right">
                                            <button type="submit" className="bg-stitch-gold hover:bg-stitch-gold-hover text-black text-xs font-bold py-2 px-4 rounded-lg uppercase transition-all">Kaydet</button>
                                        </div>
                                    </form>
                                </div>

                                <div className="bg-stitch-card stitch-border p-6 rounded-xl">
                                    <h3 className="text-sm font-bold font-montserrat text-stitch-gold uppercase border-b border-neutral-800 pb-3 mb-4">Mevcut Araçlar (İlk 2 Araç Sergilenir)</h3>
                                    {vehicles.length === 0 ? (
                                        <p className="text-xs text-stitch-text-muted text-center py-4">Koleksiyonda araç bulunamadı.</p>
                                    ) : (
                                        <div className="space-y-3">
                                            {vehicles.map(v => (
                                                <div key={v.id} className="flex items-center gap-4 bg-stitch-dark p-3 rounded-lg border border-neutral-900">
                                                    <img src={v.image} className="w-16 h-12 object-cover rounded bg-neutral-800" />
                                                    <div className="flex-1 min-w-0">
                                                        <h4 className="text-sm font-bold text-white truncate">{v.name}</h4>
                                                        <p className="text-xs text-stitch-text-muted truncate">{v.description.replace(/\n/g, ', ')}</p>
                                                    </div>
                                                    <div className="flex gap-1">
                                                        <button onClick={() => { setEditingVehicle(v); setVehName(v.name); setVehImg(v.image); setVehDesc(v.description); }} className="p-2 text-stitch-gold hover:bg-neutral-800 rounded-lg transition-all"><i className="fa-solid fa-pen-to-square"></i></button>
                                                        <button onClick={() => deleteVehicle(v.id)} className="p-2 text-red-500 hover:bg-neutral-800 rounded-lg transition-all"><i className="fa-solid fa-trash"></i></button>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen flex flex-col selection:bg-stitch-gold selection:text-black">
                    
                    {/* HERO BÖLÜMÜ */}
                    <section className="relative min-h-[85vh] flex flex-col justify-center items-center px-4 py-20 text-center border-b border-neutral-900">
                        <div className="absolute inset-0 z-0 opacity-25">
                            <img src="https://images.unsplash.com/photo-1563720223185-11003d516935?q=80&w=1600" className="w-full h-full object-cover" alt="VIP Transfer Hero" />
                            <div className="absolute inset-0 bg-gradient-to-t from-stitch-dark via-transparent to-stitch-dark"></div>
                        </div>

                        <div className="relative z-10 max-w-3xl mx-auto space-y-6">
                            <h1 className="text-4xl md:text-6xl font-black font-montserrat tracking-tight uppercase">VIP TRANSFER</h1>
                            <div className="w-20 h-1 bg-stitch-gold mx-auto rounded-full"></div>
                            <p className="text-stitch-text-muted font-light text-base md:text-lg max-w-xl mx-auto tracking-wide leading-relaxed">
                                Konforlu Güvenli Yolculuk. VIP transfer ve araç kiralama hizmetlerinde müşteri memnuniyeti odaklı, kaliteli ve güvenilir çözümler sunuyoruz.
                            </p>
                            
                            <div className="pt-6 flex flex-col sm:flex-row justify-center items-center gap-4 max-w-md mx-auto">
                                <a href={`tel:${settings.phone}`} className="w-full sm:flex-1 bg-stitch-gold hover:bg-stitch-gold-hover text-black font-bold text-xs uppercase tracking-widest py-4 px-6 rounded-lg transition-all flex items-center justify-center gap-2 shadow-xl">
                                    <i className="fa-solid fa-phone"></i> Telefon İle Ara
                                </a>
                                <a href={`https://wa.me/${settings.whatsapp.replace(/\s+/g, '')}`} target="_blank" className="w-full sm:flex-1 bg-emerald-600 hover:bg-emerald-500 text-white font-bold text-xs uppercase tracking-widest py-4 px-6 rounded-lg transition-all flex items-center justify-center gap-2 shadow-xl">
                                    <i className="fa-brands fa-whatsapp text-lg"></i> WhatsApp İletişim
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* HİZMETLERİMİZ BÖLÜMÜ */}
                    <section className="py-20 max-w-6xl w-full mx-auto px-4">
                        <div className="text-center mb-12">
                            <h2 className="text-2xl font-black font-montserrat tracking-wider uppercase text-white">HİZMETLERİMİZ</h2>
                            <div className="w-12 h-0.5 bg-stitch-gold mx-auto mt-2"></div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                            <div className="bg-stitch-card stitch-border rounded-xl p-6 text-center space-y-3 hover:translate-y-[-4px] transition-all">
                                <i className="fa-solid fa-plane-departure text-3xl text-stitch-gold"></i>
                                <h3 className="font-bold text-sm font-montserrat uppercase tracking-wide">Havalimanı Transferi</h3>
                                <p className="text-xs text-stitch-text-muted font-light leading-relaxed">Zamanında ve konforlu havalimanı transfer hizmetleri.</p>
                            </div>
                            <div className="bg-stitch-card stitch-border rounded-xl p-6 text-center space-y-3 hover:translate-y-[-4px] transition-all">
                                <i className="fa-solid fa-road text-3xl text-stitch-gold"></i>
                                <h3 className="font-bold text-sm font-montserrat uppercase tracking-wide">Şehirler Arası Transfer</h3>
                                <p className="text-xs text-stitch-text-muted font-light leading-relaxed">Türkiye'nin her noktasına güvenli ve konforlu ulaşım.</p>
                            </div>
                            <div className="bg-stitch-card stitch-border rounded-xl p-6 text-center space-y-3 hover:translate-y-[-4px] transition-all">
                                <i className="fa-solid fa-crown text-3xl text-stitch-gold"></i>
                                <h3 className="font-bold text-sm font-montserrat uppercase tracking-wide">VIP Transfer</h3>
                                <p className="text-xs text-stitch-text-muted font-light leading-relaxed">Kişiye özel, lüks donanımlı araçlarla üst düzey seyahat keyfi.</p>
                            </div>
                            <div className="bg-stitch-card stitch-border rounded-xl p-6 text-center space-y-3 hover:translate-y-[-4px] transition-all">
                                <i className="fa-solid fa-user-tie text-3xl text-stitch-gold"></i>
                                <h3 className="font-bold text-sm font-montserrat uppercase tracking-wide">Şoförlü Araç Kiralama</h3>
                                <p className="text-xs text-stitch-text-muted font-light leading-relaxed">Profesyonel şoförlerimiz ile konforlu ve güvenli seyahat.</p>
                            </div>
                        </div>
                    </section>

                    {/* ARAÇLARIMIZ BÖLÜMÜ */}
                    <section className="py-20 bg-stitch-card border-y border-neutral-900 px-4">
                        <div className="max-w-5xl w-full mx-auto">
                            <div className="text-center mb-12">
                                <h2 className="text-2xl font-black font-montserrat tracking-wider uppercase text-white">ARAÇLARIMIZ</h2>
                                <div className="w-12 h-0.5 bg-stitch-gold mx-auto mt-2"></div>
                            </div>

                            {vehicles.length === 0 ? (
                                <p className="text-xs text-stitch-text-muted text-center py-6">Araçlar Firestore'dan yükleniyor veya henüz araç eklenmemiş.</p>
                            ) : (
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                    {vehicles.slice(0, 2).map(v => (
                                        <div key={v.id} className="bg-stitch-dark stitch-border rounded-xl p-4 flex flex-col md:flex-row gap-4 items-center">
                                            <div className="w-full md:w-1/2 aspect-[4/3] bg-neutral-900 rounded-lg overflow-hidden flex-shrink-0">
                                                <img src={v.image} className="w-full h-full object-cover" alt={v.name} onError={(e)=>{e.target.src='https://images.unsplash.com/photo-1549399542-7e3f8b79c341?q=80&w=600'}} />
                                            </div>
                                            <div className="w-full md:w-1/2 space-y-2">
                                                <h3 className="font-bold font-montserrat text-sm text-stitch-gold uppercase tracking-wide">{v.name}</h3>
                                                <ul className="text-xs text-stitch-text-muted space-y-1 font-light">
                                                    {v.description.split('\n').map((line, idx) => (
                                                        <li key={idx} className="flex items-center gap-2">
                                                            <i className="fa-regular fa-circle-check text-stitch-gold text-[10px]"></i> {line}
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            )}
                        </div>
                    </section>

                    {/* İLETİŞİM VE FOOTER BÖLÜMÜ */}
                    <footer className="py-16 mt-auto px-4 max-w-4xl w-full mx-auto text-center space-y-8">
                        <div className="text-center">
                            <h2 className="text-xl font-black font-montserrat tracking-wider uppercase text-white">İLETİŞİM</h2>
                            <div className="w-10 h-0.5 bg-stitch-gold mx-auto mt-2"></div>
                        </div>

                        <div className="flex flex-col sm:flex-row justify-center items-center gap-6 max-w-md mx-auto">
                            <a href={`tel:${settings.phone}`} className="w-full flex items-center justify-center gap-3 bg-stitch-card border border-neutral-800 hover:border-stitch-gold p-4 rounded-xl transition-all">
                                <i className="fa-solid fa-phone text-stitch-gold text-lg"></i>
                                <div className="text-left">
                                    <span className="block text-[9px] text-stitch-text-muted font-bold uppercase tracking-wider">Telefon</span>
                                    <span className="block text-sm font-bold text-white tracking-wide">{settings.phone}</span>
                                </div>
                            </a>
