                                    </div>
                                    <h3 style={{fontWeight:'700', fontFamily:'Montserrat,sans-serif', fontSize:'11px', color:'#FFFFFF', textTransform:'uppercase', letterSpacing:'0.08em'}}>{srv.title}</h3>
                                    <p style={{fontSize:'12px', color:'rgba(255,255,255,0.45)', lineHeight:'1.7'}}>{srv.desc}</p>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* NEDEN BİZ */}
                    <section className="py-10 px-4" style={{backgroundColor:'#111213', borderTop:'1px solid rgba(197,168,128,0.1)', borderBottom:'1px solid rgba(197,168,128,0.1)'}}>
                        <div className="max-w-md mx-auto">
                            <h3 style={{fontSize:'10px', fontWeight:'700', fontFamily:'Montserrat,sans-serif', letterSpacing:'0.2em', color:'rgba(197,168,128,0.7)', textTransform:'uppercase', textAlign:'center', marginBottom:'32px'}}>Neden Bizi Seçmelisiniz?</h3>
                            <div className="space-y-3">
                                {[
                                    "Kurumsal Ulaşım Çözümleri",
                                    "Genç ve Dinamik Personel Kadrosu",
                                    "Son Model Ultra Lüks Araç Yelpazesi",
                                    "7 / 24 Müşteri Desteği",
                                    "Tam Zamanında Ulaşım",
                                    "% 100 Memnuniyet Garantisi"
                                ].map((item, index) => (
                                    <div key={index} style={{display:'flex', alignItems:'center', gap:'16px', backgroundColor:'rgba(255,255,255,0.03)', padding:'14px', borderRadius:'12px', border:'1px solid rgba(197,168,128,0.1)'}}>
                                        <div style={{width:'28px', height:'28px', backgroundColor:'rgba(197,168,128,0.1)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', border:'1px solid rgba(197,168,128,0.25)', flexShrink:0}}>
                                            <i className="fa-solid fa-check" style={{fontSize:'10px', color:'#C5A880'}}></i>
                                        </div>
                                        <span style={{fontSize:'13px', fontWeight:'500', color:'rgba(255,255,255,0.8)'}}>{item}</span>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* ARAÇ FİLOSU */}
                    <section className="py-14 max-w-5xl w-full mx-auto px-4">
                        <div className="text-center mb-10">
                            <h2 style={{fontSize:'15px', fontWeight:'700', fontFamily:'Montserrat,sans-serif', letterSpacing:'0.15em', textTransform:'uppercase', color:'#FFFFFF'}}>LÜKS ARAÇ FİLOMUZ</h2>
                            <div style={{width:'32px', height:'2px', backgroundColor:'#C5A880', margin:'8px auto 0'}}></div>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                            {displayVehicles.map(v => (
                                <div key={v.id} style={{backgroundColor:'#161719', border:'1px solid rgba(197,168,128,0.15)', borderRadius:'16px', padding:'20px', display:'flex', flexDirection:'column', gap:'20px'}} className="sm:flex-row sm:items-center">
                                    <div className="flex flex-col sm:flex-row gap-5 items-center">
                                        <div style={{width:'100%', maxWidth:'180px', aspectRatio:'4/3', backgroundColor:'#0D0E10', borderRadius:'12px', overflow:'hidden', flexShrink:0, border:'1px solid rgba(197,168,128,0.1)'}}>
                                            <img src={v.image} style={{width:'100%', height:'100%', objectFit:'cover'}} alt={v.name} onError={(e)=>{e.target.src='https://images.unsplash.com/photo-1549399542-7e3f8b79c341?q=80&w=500'}} />
                                        </div>
                                        <div className="space-y-3 flex-1">
                                            <h3 style={{fontWeight:'700', fontFamily:'Montserrat,sans-serif', fontSize:'11px', color:'#FFFFFF', textTransform:'uppercase', letterSpacing:'0.08em', borderBottom:'1px solid rgba(197,168,128,0.15)', paddingBottom:'8px'}}>{v.name}</h3>
                                            <ul className="space-y-2">
                                                {v.description.split('\n').map((line, idx) => (
                                                    <li key={idx} style={{display:'flex', alignItems:'center', gap:'8px', fontSize:'12px', color:'rgba(255,255,255,0.5)'}}>
                                                        <i className="fa-solid fa-circle" style={{fontSize:'5px', color:'#C5A880'}}></i> {line}
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </section>

                    {/* İLETİŞİM */}
                    <section className="py-10 px-4 max-w-4xl mx-auto w-full">
                        <div style={{backgroundColor:'#161719', border:'1px solid rgba(197,168,128,0.2)', borderRadius:'16px', padding:'32px', textAlign:'center'}} className="space-y-4">
                            <div style={{width:'64px', height:'64px', backgroundColor:'rgba(197,168,128,0.1)', borderRadius:'50%', display:'flex', alignItems:'center', justifyContent:'center', margin:'0 auto', border:'1px solid rgba(197,168,128,0.2)'}}>
                                <i className="fa-solid fa-phone-flip text-xl" style={{color:'#C5A880'}}></i>
                            </div>
                            <h3 style={{fontSize:'18px', fontWeight:'700', fontFamily:'Montserrat,sans-serif', color:'#FFFFFF', letterSpacing:'0.05em'}}>İletişime Geçin</h3>
                            <p style={{fontSize:'13px', color:'rgba(255,255,255,0.5)', maxWidth:'400px', margin:'0 auto', lineHeight:'1.7'}}>
                                Sormak İstediğiniz Tüm Sorular İçin Bir Telefon Uzağınızdayız
                            </p>
                            <div className="pt-2">
                                <a href={`tel:${cleanPhone}`} style={{display:'inline-block', backgroundColor:'rgba(197,168,128,0.15)', border:'1px solid rgba(197,168,128,0.4)', color:'#C5A880', fontWeight:'700', fontSize:'11px', letterSpacing:'0.12em', textTransform:'uppercase', padding:'14px 40px', borderRadius:'9999px', textDecoration:'none'}}>
                                    İLETİŞİM
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* FOOTER */}
                    <footer className="mt-8 text-center">
                        <p style={{fontSize:'10px', fontWeight:'700', color:'rgba(255,255,255,0.2)', textTransform:'uppercase', letterSpacing:'0.2em'}}>
                            © 2026 VIP TRANSFER. TÜM HAKLARI SAKLIDIR.
                        </p>
                    </footer>

                </div>
            );
        }

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);
    </script>
</body>
</html>
