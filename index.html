<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>VIP Transfer | Lüks ve Konforlu Yolculuk</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <!-- Google Fonts & FontAwesome Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "stitch-dark": "#0B0C10",
                        "stitch-card": "#15171C",
                        "stitch-gold": "#C5A880",
                        "stitch-gold-hover": "#E5C8A0",
                        "stitch-text-muted": "#9A9DA5"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0B0C10;
            color: #FFFFFF;
            -webkit-tap-highlight-color: transparent;
        }
        .stitch-border {
            border: 1px solid rgba(197, 168, 128, 0.12);
        }
        .stitch-border-focus:focus {
            border-color: #C5A880;
            outline: none;
        }
        .mobile-touch-active:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
    </style>
</head>
<body class="font-sans antialiased select-none md:select-text">

    <div id="root"></div>

    <!-- Firebase SDK Modülleri -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC8JHwiUcHlJpoiFewsaCzSBRS8SFU-A48",
            authDomain: "viptransfer-65c5e.firebaseapp.com",
            projectId: "viptransfer-65c5e",
            storageBucket: "viptransfer-65c5e.firebasestorage.app",
            messagingSenderId: "279013861180",
            appId: "1:279013861180:web:2193543a98d147a1e42039",
            measurementId: "G-24V8G9KF3B"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.FirebaseBridge = { auth, db, signInWithEmailAndPassword, signOut, onAuthStateChanged, doc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc };
    </script>

    <!-- React Uygulama Mantığı -->
    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('home'); 
            const [user, setUser] = useState(null);
            const [vehicles, setVehicles] = useState([]);
            const [settings, setSettings] = useState({ phone: '0544 518 73 99', whatsapp: '0544 518 73 99' }); 
            const [loading, setLoading] = useState(true);

            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            const [editingVehicle, setEditingVehicle] = useState(null);
            const [vehName, setVehName] = useState('');
            const [vehImg, setVehImg] = useState(''); // Artık burası Base64 resim verisini tutacak
            const [vehDesc, setVehDesc] = useState('');
            const [uploading, setUploading] = useState(false);

            useEffect(() => {
                const handleHashChange = () => {
                    if (window.location.hash === '#/admin') {
                        if (user) setView('admin-panel');
                        else setView('admin-login');
                    } else {
                        setView('home');
                    }
                };
                window.addEventListener('hashchange', handleHashChange);
                handleHashChange();
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, [user]);

            useEffect(() => {
                const checkBridge = setInterval(() => {
                    if (window.FirebaseBridge) {
                        clearInterval(checkBridge);
                        const { auth, db, onAuthStateChanged, collection, onSnapshot, doc } = window.FirebaseBridge;

                        onAuthStateChanged(auth, (currentUser) => {
                            if (currentUser && currentUser.email.includes('@admin')) {
                                setUser(currentUser);
                                if (window.location.hash === '#/admin') setView('admin-panel');
                            } else {
                                setUser(null);
                                if (window.location.hash === '#/admin') setView('admin-login');
                            }
                        });

                        onSnapshot(collection(db, "vehicles"), (snapshot) => {
                            const list = [];
                            snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                            setVehicles(list);
                        });

                        onSnapshot(doc(db, "settings", "contact"), (docSnap) => {
                            if (docSnap.exists()) {
                                setSettings(docSnap.data());
                            }
                        });

                        setLoading(false);
                    }
                }, 100);
            }, []);

            // Telefondan fotoğraf seçildiğinde çalışan fonksiyon
            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                setUploading(true);
                const reader = new FileReader();
                reader.onloadend = () => {
                    setVehImg(reader.result); // Resmi base64 formatına çevirip state'e atıyoruz
                    setUploading(false);
                };
                reader.readAsDataURL(file);
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                const emailInput = loginEmail.trim().toLowerCase();
                try {
                    const { auth, signInWithEmailAndPassword } = window.FirebaseBridge;
                    await signInWithEmailAndPassword(auth, emailInput, loginPassword);
                } catch (err) {
                    setLoginError('Hatalı e-posta veya şifre.');
                }
            };

            const handleLogout = async () => {
                const { auth, signOut } = window.FirebaseBridge;
                await signOut(auth);
                window.location.hash = '';
                setView('home');
            };

            const saveVehicle = async (e) => {
                e.preventDefault();
                if(!vehImg) {
                    alert("Lütfen araç için bir fotoğraf yükleyin!");
                    return;
                }
                const { db, collection, addDoc, doc, updateDoc } = window.FirebaseBridge;
                const data = { name: vehName, image: vehImg, description: vehDesc };

                if (editingVehicle) {
                    await updateDoc(doc(db, "vehicles", editingVehicle.id), data);
                    setEditingVehicle(null);
                } else {
                    await addDoc(collection(db, "vehicles"), data);
                }
                setVehName(''); setVehImg(''); setVehDesc('');
            };

            const deleteVehicle = async (id) => {
                if (confirm('Bu aracı silmek istediğinize emin misiniz?')) {
                    const { db, doc, deleteDoc } = window.FirebaseBridge;
                    await deleteDoc(doc(db, "vehicles", id));
                }
            };

            const saveContact = async (e) => {
                e.preventDefault();
                const { db, doc, setDoc } = window.FirebaseBridge;
                await setDoc(doc(db, "settings", "contact"), settings);
                alert('Numaralar başarıyla güncellendi!');
            };

            const getCleanNumber = (num) => {
                let formatted = num.replace(/\s+/g, '');
                if(!formatted.startsWith('+') && !formatted.startsWith('00')) {
                    if(formatted.startsWith('0')) {
                        formatted = '+90' + formatted.substring(1);
                    } else if(!formatted.startsWith('90')) {
                        formatted = '+90' + formatted;
                    } else {
                        formatted = '+' + formatted;
                    }
                }
                return formatted;
            };

            const cleanPhone = getCleanNumber(settings.phone);
            const cleanWhatsapp = getCleanNumber(settings.whatsapp).replace('+', '');

            // Firebase boşsa gösterilecek varsayılan araç listesi
            const defaultVehicles = [
                {
                    id: "default-1",
                    name: "MERCEDES VITO VIP (ÖRNEK)",
                    image: "https://images.unsplash.com/photo-1549399542-7e3f8b79c341?q=80&w=600",
                    description: "Ultra Lüks VIP Tasarım\n9+1 Geniş Yolcu Kapasitesi\nBuzdolabı ve TV Eğlence Sistemi\nÜcretsiz Wi-Fi ve İkramlar"
                }
            ];

            const displayVehicles = vehicles.length > 0 ? vehicles : defaultVehicles;

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-stitch-dark">
                        <div className="text-center">
                            <i className="fa-solid fa-spinner animate-spin text-3xl text-stitch-gold mb-3"></i>
                            <p className="font-montserrat tracking-widest text-xs text-stitch-text-muted">YÜKLENİYOR...</p>
                        </div>
                    </div>
                );
            }

            // --- ADMIN LOGIN ---
            if (view === 'admin-login') {
                return (
                    <div className="min-h-screen flex items-center justify-center p-4 bg-stitch-dark">
                        <div className="w-full max-w-md bg-stitch-card stitch-border rounded-xl p-6 shadow-2xl">
                            <h2 className="text-xl font-bold font-montserrat text-center text-stitch-gold tracking-wide mb-6">YÖNETİCİ GİRİŞİ</h2>
                            {loginError && <div className="bg-red-900/30 border border-red-500 text-red-200 p-3 rounded-lg text-xs text-center mb-4">{loginError}</div>}
                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <input type="email" required className="w-full bg-stitch-dark border border-neutral-800 text-white rounded-lg px-4 py-3 text-sm stitch-border-focus" placeholder="E-Posta" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} />
                                </div>
                                <div>
                                    <input type="password" required className="w-full bg-stitch-dark border border-neutral-800 text-white rounded-lg px-4 py-3 text-sm stitch-border-focus" placeholder="Şifre" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} />
                                </div>
                                <button type="submit" className="w-full bg-stitch-gold text-black font-bold py-3 rounded-lg text-xs font-montserrat tracking-wider uppercase transition-all mobile-touch-active">GİRİŞ YAP</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // --- ADMIN PANEL ---
            if (view === 'admin-panel') {
                return (
                    <div className="min-h-screen bg-stitch-dark flex flex-col pb-24 md:pb-0">
                        <header className="bg-stitch-card border-b border-neutral-800 py-4 px-4 flex justify-between items-center">
                            <div>
                                <h1 className="text-base font-bold font-montserrat text-stitch-gold">VIP PANEL</h1>
                                <p className="text-[11px] text-stitch-text-muted">{user?.email}</p>
                            </div>
                            <button onClick={handleLogout} className="bg-red-600/20 text-red-200 border border-red-600/40 text-xs font-bold px-3 py-1.5 rounded-lg transition-all">ÇAKIŞ</button>
                        </header>

                        <div className="flex-1 max-w-6xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-stitch-card stitch-border p-5 rounded-xl h-fit">
                                <h3 className="text-xs font-bold font-montserrat text-stitch-gold uppercase border-b border-neutral-800 pb-2 mb-4">
                                    {editingVehicle ? 'Aracı Düzenle' : 'Yeni Araç Ekle'}
                                </h3>
                                <form onSubmit={saveVehicle} className="space-y-4">
                                    <input type="text" required className="w-full bg-stitch-dark border border-neutral-800 text-white text-sm rounded-lg px-3 py-2 stitch-border-focus" placeholder="Araç Adı" value={vehName} onChange={e => setVehName(e.target.value)} />
                                    
                                    {/* FOTOĞRAF YÜKLEME ALANI */}
                                    <div className="space-y-2">
                                        <label className="block text-[11px] text-stitch-text-muted uppercase font-bold tracking-wider">Araç Fotoğrafı</label>
                                        <div className="flex items-center justify-center w-full">
                                            <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-neutral-800 border-dashed rounded-lg cursor-pointer bg-stitch-dark hover:border-stitch-gold transition-colors p-2">
                                                {vehImg ? (
                                                    <img src={vehImg} className="w-full h-full object-cover rounded-lg" />
                                                ) : (
                                                    <div className="flex flex-col items-center justify-center pt-5 pb-6 text-center">
                                                        <i className={`fa-solid ${uploading ? 'fa-spinner animate-spin' : 'fa-cloud-arrow-up'} text-xl text-stitch-gold mb-2`}></i>
                                                        <p className="text-xs text-white font-medium">Fotoğraf Seç / Çek</p>
                                                        <p className="text-[10px] text-stitch-text-muted mt-1">Doğrudan galeriden yükleyin</p>
                                                    </div>
                                                )}
                                                <input type="file" accept="image/*" className="hidden" onChange={handleFileChange} />
                                            </label>
                                        </div>
                                    </div>

                                    <textarea required rows="3" className="w-full bg-stitch-dark border border-neutral-800 text-white text-sm rounded-lg px-3 py-2 stitch-border-focus" placeholder="Özellikler (Her satıra bir özellik)" value={vehDesc} onChange={e => setVehDesc(e.target.value)}></textarea>
                                    <button type="submit" className="w-full bg-stitch-gold text-black text-xs font-bold py-2.5 rounded-lg uppercase tracking-wider mobile-touch-active">KAYDET</button>
                                </form>
                            </div>

                            <div className="md:col-span-2 space-y-6">
                                <div className="bg-stitch-card stitch-border p-5 rounded-xl">
                                    <h3 className="text-xs font-bold font-montserrat text-stitch-gold uppercase border-b border-neutral-800 pb-2 mb-4">Numaralar</h3>
                                    <form onSubmit={saveContact} className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <input type="text" className="w-full bg-stitch-dark border border-neutral-800 text-white text-sm rounded-lg px-3 py-2 stitch-border-focus" value={settings.phone} onChange={e => setSettings({...settings, phone: e.target.value})} />
                                        <input type="text" className="w-full bg-stitch-dark border border-neutral-800 text-white text-sm rounded-lg px-3 py-2 stitch-border-focus" value={settings.whatsapp} onChange={e => setSettings({...settings, whatsapp: e.target.value})} />
                                        <button type="submit" className="sm:col-span-2 bg-stitch-gold text-black text-xs font-bold py-2 px-4 rounded-lg uppercase mobile-touch-active">KAYDET</button>
                                    </form>
                                </div>

                                <div className="bg-stitch-card stitch-border p-5 rounded-xl">
                                    <h3 className="text-xs font-bold font-montserrat text-stitch-gold uppercase border-b border-neutral-800 pb-2 mb-4">Mevcut Araçlar ({vehicles.length})</h3>
                                    <div className="space-y-2 max-h-96 overflow-y-auto pr-1">
                                        {vehicles.map(v => (
                                            <div key={v.id} className="flex items-center gap-3 bg-stitch-dark p-2 rounded-lg">
                                                <img src={v.image} className="w-12 h-9 object-cover rounded bg-neutral-800" />
                                                <div className="flex-1 min-w-0"><h4 className="text-xs font-bold text-white truncate">{v.name}</h4></div>
                                                <button onClick={() => { setEditingVehicle(v); setVehName(v.name); setVehImg(v.image); setVehDesc(v.description); }} className="p-2 text-stitch-gold"><i className="fa-solid fa-pen"></i></button>
                                                <button onClick={() => deleteVehicle(v.id)} className="p-2 text-red-500"><i className="fa-solid fa-trash"></i></button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            // --- ANA SAYFA MÜŞTERİ VİTRİNİ ---
            return (
                <div className="min-h-screen flex flex-col pb-24 md:pb-0">
                    
                    {/* HERO BÖLÜMÜ */}
                    <section className="relative min-h-[75vh] flex flex-col justify-center items-center px-4 py-16 text-center border-b border-neutral-900 overflow-hidden">
                        <div className="absolute inset-0 z-0 opacity-20">
                            <img src="https://images.unsplash.com/photo-1563720223185-11003d516935?q=80&w=800" className="w-full h-full object-cover" alt="VIP" />
                            <div className="absolute inset-0 bg-gradient-to-t from-stitch-dark via-transparent to-stitch-dark"></div>
                        </div>

                        <div className="relative z-10 max-w-2xl mx-auto space-y-4">
                            <span className="text-[10px] bg-stitch-gold/10 text-stitch-gold border border-stitch-gold/20 px-3 py-1 rounded-full font-bold uppercase tracking-widest">7/24 Premium Hizmet</span>
                            <h1 className="text-4xl md:text-6xl font-black font-montserrat tracking-tight uppercase leading-none">VIP TRANSFER</h1>
                            <div className="w-12 h-0.5 bg-stitch-gold mx-auto rounded-full"></div>
                            <p className="text-stitch-text-muted font-light text-xs md:text-sm max-w-md mx-auto leading-relaxed px-2">
                                Konforlu ve güvenli yolculuk. Müşteri memnuniyeti odaklı, lüks ve kaliteli transfer çözümleri sunuyoruz.
                            </p>
                            
                            <div className="pt-4 flex flex-col sm:flex-row justify-center items-center gap-3 max-w-sm mx-auto w-full px-2">
                                <a href={`tel:${cleanPhone}`} className="w-full bg-stitch-gold text-black font-bold text-xs uppercase tracking-wider py-3.5 px-4 rounded-xl transition-transform active:scale-95 flex items-center justify-center gap-2 mobile-touch-active shadow-lg">
                                    <i className="fa-solid fa-phone text-sm"></i> Hemen Ara
                                </a>
                                <a href={`whatsapp://send?phone=${cleanWhatsapp}`} className="w-full bg-emerald-600 text-white font-bold text-xs uppercase tracking-wider py-3.5 px-4 rounded-xl transition-transform active:scale-95 flex items-center justify-center gap-2 mobile-touch-active shadow-lg">
                                    <i className="fa-brands fa-whatsapp text-base"></i> Doğrudan WhatsApp
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* HİZMETLERİMİZ BÖLÜMÜ (3 ADET) */}
                    <section className="py-12 max-w-5xl w-full mx-auto px-4">
                        <div className="text-center mb-8">
                            <h2 className="text-lg font-bold font-montserrat tracking-wider uppercase text-white">HİZMETLERİMİZ</h2>
                            <div className="w-8 h-0.5 bg-stitch-gold mx-auto mt-1.5"></div>
                        </div>

                        <div className="grid grid-cols-1 sm:grid-cols-3 gap-4">
                            <div className="bg-stitch-card stitch-border rounded-xl p-5 text-center space-y-2">
                                <i className="fa-solid fa-plane-departure text-xl text-stitch-gold"></i>
                                <h3 className="font-bold text-xs font-montserrat uppercase tracking-wide text-white">Havalimanı Transferi</h3>
                                <p className="text-[11px] text-stitch-text-muted font-light leading-snug">Zamanında ve konforlu karşılama ve ulaşım hizmetleri.</p>
                            </div>
                            <div className="bg-stitch-card stitch-border rounded-xl p-5 text-center space-y-2">
                                <i className="fa-solid fa-road text-xl text-stitch-gold"></i>
                                <h3 className="font-bold text-xs font-montserrat uppercase tracking-wide text-white">Şehirler Arası Transfer</h3>
                                <p className="text-[11px] text-stitch-text-muted font-light leading-snug">Türkiye'nin her noktasına konforlu uzun yol seyahati.</p>
                            </div>
                            <div className="bg-stitch-card stitch-border rounded-xl p-5 text-center space-y-2">
                                <i className="fa-solid fa-crown text-xl text-stitch-gold"></i>
                                <h3 className="font-bold text-xs font-montserrat uppercase tracking-wide text-white">Ultra VIP Hizmet</h3>
                                <p className="text-[11px] text-stitch-text-muted font-light leading-snug">Kişiye özel, lüks donanımlı araçlarla üst düzey seyahat keyfi.</p>
                            </div>
                        </div>
                    </section>

                    {/* ARAÇLARIMIZ BÖLÜMÜ - SINIRSIZ / DİNAMİK YAPI */}
                    <section className="py-12 bg-stitch-card border-y border-neutral-900 px-4">
                        <div className="max-w-5xl w-full mx-auto">
                            <div className="text-center mb-8">
                                <h2 className="text-lg font-bold font-montserrat tracking-wider uppercase text-white">ARAÇLARIMIZ</h2>
                                <div className="w-8 h-0.5 bg-stitch-gold mx-auto mt-1.5"></div>
                            </div>

                            {/* 2 Sınırı Kalktı! Kaç araba eklenirse eklensin burada otomatik şıkça hizalanacak */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {displayVehicles.map(v => (
                                    <div key={v.id} className="bg-stitch-dark stitch-border rounded-xl p-3 flex flex-col sm:flex-row gap-4 items-center">
                                        <div className="w-full sm:w-2/5 aspect-[4/3] bg-neutral-900 rounded-lg overflow-hidden flex-shrink-0">
                                            <img src={v.image} className="w-full h-full object-cover" alt={v.name} onError={(e)=>{e.target.src='https://images.unsplash.com/photo-1549399542-7e3f8b79c341?q=80&w=500'}} />
                                        </div>
                                        <div className="w-full sm:w-3/5 space-y-1.5 self-start sm:self-center">
                                            <h3 className="font-bold font-montserrat text-xs text-stitch-gold uppercase tracking-wide">{v.name}</h3>
                                            <ul className="text-[11px] text-stitch-text-muted space-y-1 font-light">
                                                {v.description.split('\n').map((line, idx) => (
                                                    <li key={idx} className="flex items-center gap-1.5 truncate">
                                                        <i className="fa-regular fa-circle-check text-stitch-gold text-[9px]"></i> {line}
                                                    </li>
                                                ))}
                                            </ul>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* İLETİŞİM ALTI */}
                    <footer className="py-12 px-4 max-w-xl w-full mx-auto text-center space-y-4">
                        <p className="text-[10px] font-bold text-neutral-600 uppercase tracking-widest">
                            © 2026 VIP TRANSFER. TÜM HAKLARI SAKLIDIR.
                        </p>
                    </footer>

                    {/* MOBİL SABİT ALT BAR */}
                    <div className="fixed bottom-0 left-0 right-0 z-50 bg-stitch-card/90 backdrop-blur-md border-t border-neutral-800/80 p-3 flex gap-3 md:hidden shadow-[0_-8px_24px_rgba(0,0,0,0.5)]">
                        <a href={`tel:${cleanPhone}`} className="flex-1 bg-neutral-900 border border-neutral-800 text-white font-bold text-xs uppercase tracking-wider py-3.5 rounded-xl flex items-center justify-center gap-2 mobile-touch-active shadow-md">
                            <i className="fa-solid fa-phone text-stitch-gold text-sm animate-pulse"></i> Arama Yap
                        </a>
