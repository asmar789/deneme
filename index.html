<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>VIP Transfer | Lüks ve Güvenilir Ulaşım</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0A0B0D; -webkit-tap-highlight-color: transparent; }
        .font-montserrat { font-family: 'Montserrat', sans-serif; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        function App() {
            // İletişim bilgilerini buraya yaz usta
            const settings = {
                phone: "+90 500 000 00 00",
                whatsapp: "+90 500 000 00 00"
            };

            // Araç listesi (Burada image kısmına GitHub'a yükleyeceğin resim adlarını yaz)
            const vehicles = [
                {
                    id: 1,
                    name: "Mercedes-Benz Vito VIP",
                    description: "Ultra lüks iç tasarım ve kusursuz konfor.",
                    image: "araba1.jpg" 
                },
                {
                    id: 2,
                    name: "Volkswagen Transporter VIP",
                    description: "Özel seyahatleriniz için lüks donanım.",
                    image: "araba2.jpg"
                }
            ];

            const cleanPhone = settings.phone.replace(/\s+/g, '');
            const cleanWhatsapp = settings.whatsapp.replace(/\s+/g, '').replace('+', '');

            return (
                <div className="min-h-screen text-white p-4 max-w-md mx-auto bg-[#0A0B0D] pb-24">
                    <header className="flex justify-between items-center py-4 border-b border-white/5">
                        <h1 className="font-montserrat font-black text-2xl text-white">VIP <span className="text-[#C5A880]">TRANSFER</span></h1>
                    </header>

                    <div className="my-6 h-56 rounded-2xl bg-black border border-white/10 flex flex-col justify-end p-6">
                        <h2 className="font-montserrat font-black text-2xl text-white">Konforlu VIP Seyahat</h2>
                    </div>

                    <div className="grid gap-6">
                        {vehicles.map((v) => (
                            <div key={v.id} className="bg-[#13151A] rounded-2xl overflow-hidden border border-white/5">
                                <img src={v.image} alt={v.name} className="w-full h-52 object-cover" />
                                <div className="p-5">
                                    <h4 className="font-bold text-xl">{v.name}</h4>
                                    <p className="text-sm text-white/50 mt-1">{v.description}</p>
                                    <a href={`https://wa.me/${cleanWhatsapp}`} className="block mt-5 text-center bg-[#25D366] py-3 rounded-xl font-bold text-sm">
                                        <i className="fa-brands fa-whatsapp mr-2"></i> REZERVASYON
                                    </a>
                                </div>
                            </div>
                        ))}
                    </div>

                    <div className="mt-12 p-8 bg-[#13151A] rounded-2xl border border-[#C5A880]/20 text-center">
                        <h3 className="font-bold text-lg">İletişime Geçin</h3>
                        <a href={`tel:${cleanPhone}`} className="block mt-4 bg-[#C5A880]/20 text-[#C5A880] py-3 rounded-full font-bold uppercase text-xs">
                            Hemen Ara
                        </a>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
