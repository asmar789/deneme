<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
    <title>VIP Transfer | Lüks ve Güvenilir Ulaşım</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script id="tailwind-config">
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        "vip-bg": "#F8F9FA",
                        "vip-card": "#FFFFFF",
                        "vip-dark": "#1E2229",
                        "vip-gold": "#C5A880",
                        "vip-gold-dark": "#A88F6B",
                        "vip-muted": "#6C757D"
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        montserrat: ['Montserrat', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0A0B0D;
            color: #1E2229;
            -webkit-tap-highlight-color: transparent;
        }
        .premium-shadow {
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }
        .mobile-touch-active:active {
            transform: scale(0.97);
            opacity: 0.95;
        }
        .hero-section {
            background-size: cover;
            background-position: center top;
            background-repeat: no-repeat;
            position: relative;
        }
        .hero-section::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(
                to bottom,
                rgba(10, 11, 13, 0.55) 0%,
                rgba(10, 11, 13, 0.45) 50%,
                rgba(10, 11, 13, 0.75) 100%
            );
            pointer-events: none;
            z-index: 0;
        }
        .hero-section > * {
            position: relative;
            z-index: 1;
        }
        .page-bg {
            background-color: #0D0E10;
        }
    </style>
</head>
<body class="font-sans antialiased select-none md:select-text page-bg">

    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC8JHwiUcHlJpoiFewsaCzSBRS8SFU-A48",
            authDomain: "viptransfer-65c5e.firebaseapp.com",
            projectId: "viptransfer-65c5e",
            storageBucket: "viptransfer-65c5e.firebasestorage.app",
            messagingSenderId: "279013861180",
            appId: "1:279013861180:web:2193543a98d147a1e42039",
            measurementId: "G-24V8G9KF3B"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.FirebaseBridge = { auth, db, signInWithEmailAndPassword, signOut, onAuthStateChanged, doc, setDoc, collection, onSnapshot, addDoc, updateDoc, deleteDoc, getDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('home'); 
            const [user, setUser] = useState(null);
            const [vehicles, setVehicles] = useState([]);
            const [settings, setSettings] = useState({ phone: '0544 518 73 99', whatsapp: '0544 518 73 99' }); 
            const [appearance, setAppearance] = useState({ heroBg: '', adminLoginBg: '' });
            const [loading, setLoading] = useState(true);

            const [loginEmail, setLoginEmail] = useState('');
            const [loginPassword, setLoginPassword] = useState('');
            const [loginError, setLoginError] = useState('');

            const [editingVehicle, setEditingVehicle] = useState(null);
            const [vehName, setVehName] = useState('');
            const [vehImg, setVehImg] = useState(''); 
            const [vehDesc, setVehDesc] = useState('');
            const [uploading, setUploading] = useState(false);

            // Admin panel görsel yükleme durumları
            const [uploadingHeroBg, setUploadingHeroBg] = useState(false);
            const [uploadingAdminBg, setUploadingAdminBg] = useState(false);
            const [tempHeroBg, setTempHeroBg] = useState('');
            const [tempAdminBg, setTempAdminBg] = useState('');

            useEffect(() => {
                const handleHashChange = () => {
                    if (window.location.hash === '#/admin') {
                        if (user) setView('admin-panel');
                        else setView('admin-login');
                    } else {
                        setView('home');
                    }
                };
                window.addEventListener('hashchange', handleHashChange);
                handleHashChange();
                return () => window.removeEventListener('hashchange', handleHashChange);
            }, [user]);

            useEffect(() => {
                const checkBridge = setInterval(() => {
                    if (window.FirebaseBridge) {
                        clearInterval(checkBridge);
                        const { auth, db, onAuthStateChanged, collection, onSnapshot, doc } = window.FirebaseBridge;

                        onAuthStateChanged(auth, (currentUser) => {
                            if (currentUser && currentUser.email.includes('@admin')) {
                                setUser(currentUser);
                                if (window.location.hash === '#/admin') setView('admin-panel');
                            } else {
                                setUser(null);
                                if (window.location.hash === '#/admin') setView('admin-login');
                            }
                        });

                        onSnapshot(collection(db, "vehicles"), (snapshot) => {
                            const list = [];
                            snapshot.forEach(doc => list.push({ id: doc.id, ...doc.data() }));
                            setVehicles(list);
                        });

                        onSnapshot(doc(db, "settings", "contact"), (docSnap) => {
                            if (docSnap.exists()) {
                                setSettings(docSnap.data());
                            }
                        });

                        // Görsel arka planları Firebase'den dinle
                        onSnapshot(doc(db, "settings", "appearance"), (docSnap) => {
                            if (docSnap.exists()) {
                                const data = docSnap.data();
                                setAppearance(data);
                                setTempHeroBg(data.heroBg || '');
                                setTempAdminBg(data.adminLoginBg || '');
                            }
                        });

                        setLoading(false);
                    }
                }, 100);
            }, []);

            // Araç fotoğrafı yükleme
            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploading(true);
                const reader = new FileReader();
                reader.onloadend = () => {
                    setVehImg(reader.result); 
                    setUploading(false);
                };
                reader.readAsDataURL(file);
            };

            // Hero arka plan seçimi (henüz kaydetme)
            const handleHeroBgChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploadingHeroBg(true);
                const reader = new FileReader();
                reader.onloadend = () => {
                    setTempHeroBg(reader.result);
                    setUploadingHeroBg(false);
                };
                reader.readAsDataURL(file);
            };

            // Admin giriş arka plan seçimi (henüz kaydetme)
            const handleAdminBgChange = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                setUploadingAdminBg(true);
                const reader = new FileReader();
                reader.onloadend = () => {
                    setTempAdminBg(reader.result);
                    setUploadingAdminBg(false);
                };
                reader.readAsDataURL(file);
            };

            // Arka planları Firebase'e kaydet
            const saveAppearance = async (e) => {
                e.preventDefault();
                const { db, doc, setDoc } = window.FirebaseBridge;
                await setDoc(doc(db, "settings", "appearance"), {
                    heroBg: tempHeroBg,
                    adminLoginBg: tempAdminBg
                });
                alert('Arka plan görselleri başarıyla kaydedildi!');
            };

            const handleLogin = async (e) => {
                e.preventDefault();
                setLoginError('');
                try {
                    const { auth, signInWithEmailAndPassword } = window.FirebaseBridge;
                    await signInWithEmailAndPassword(auth, loginEmail.trim().toLowerCase(), loginPassword);
                } catch (err) {
                    setLoginError('Hatalı e-posta veya şifre.');
                }
            };

            const handleLogout = async () => {
                const { auth, signOut } = window.FirebaseBridge;
                await signOut(auth);
                window.location.hash = '';
                setView('home');
            };

            const saveVehicle = async (e) => {
                e.preventDefault();
                if(!vehImg) {
                    alert("Lütfen araç için bir fotoğraf yükleyin!");
                    return;
                }
                const { db, collection, addDoc, doc, updateDoc } = window.FirebaseBridge;
                const data = { name: vehName, image: vehImg, description: vehDesc };
                if (editingVehicle) {
                    await updateDoc(doc(db, "vehicles", editingVehicle.id), data);
                    setEditingVehicle(null);
                } else {
                    await addDoc(collection(db, "vehicles"), data);
                }
                setVehName(''); setVehImg(''); setVehDesc('');
            };

            const deleteVehicle = async (id) => {
                if (confirm('Bu aracı silmek istediğinize emin misiniz?')) {
                    const { db, doc, deleteDoc } = window.FirebaseBridge;
                    await deleteDoc(doc(db, "vehicles", id));
                }
            };

            const saveContact = async (e) => {
                e.preventDefault();
                const { db, doc, setDoc } = window.FirebaseBridge;
                await setDoc(doc(db, "settings", "contact"), settings);
                alert('Numaralar başarıyla güncellendi!');
            };

            const getCleanNumber = (num) => {
                let formatted = num.replace(/\s+/g, '');
                if(!formatted.startsWith('+') && !formatted.startsWith('00')) {
                    if(formatted.startsWith('0')) {
                        formatted = '+90' + formatted.substring(1);
                    } else if(!formatted.startsWith('90')) {
                        formatted = '+90' + formatted;
                    } else {
                        formatted = '+' + formatted;
                    }
                }
                return formatted;
            };

            const cleanPhone = getCleanNumber(settings.phone);
            const cleanWhatsapp = getCleanNumber(settings.whatsapp).replace('+', '');

            const defaultVehicles = [
                {
                    id: "default-1",
                    name: "MERCEDES-BENZ VITO ULTRA VIP",
                    image: "https://images.unsplash.com/photo-1549399542-7e3f8b79c341?q=80&w=600",
                    description: "Özel Tasarım Deri Koltuklar\nBuzdolabı & Maybach Tavan Aydınlatma\nApple TV & Bölmeli Eğlence Sistemi\nÜcretsiz Wi-Fi & Soğuk İkramlar"
                },
                {
                    id: "default-2",
                    name: "MERCEDES-BENZ SPRINTER VIP",
                    image: "https://images.unsplash.com/photo-1570125909232-eb263c188f7e?q=80&w=600",
                    description: "13+1 Geniş ve Konforlu Kapasite\nÇalışma Masası & Geniş Bagaj Hacmi\nKurumsal Grup Transferlerine Uygun\nŞoförlü Lüks Seyahat Deneyimi"
                }
            ];

            const services = [
                { icon: "fa-plane-departure", title: "Havalimanı Transfer", desc: "Geliş ve gidiş saatlerinize göre planlanan, bagaj yardım hizmeti dahil konforlu havalimanı ulaşımı." },
                { icon: "fa-hotel", title: "Otel & Şehir İçi Transfer", desc: "Havaalanından otelinize veya şehir içinde dilediğiniz noktaya ultra konforlu VIP ulaşım çözümleri." },
                { icon: "fa-map-location-dot", title: "Şehirler Arası Transfer", desc: "Uzun mesafeli yolculuklarınızı yorucu olmaktan çıkaran, business class konforunda seyahat." },
                { icon: "fa-user-tie", title: "Şoförlü Araç Kiralama", desc: "İş toplantılarınız, özel günleriniz veya günlük planlarınız için tahsis edilen profesyonel şoför hizmeti." },
                { icon: "fa-business-time", title: "Kurumsal Ulaşım", desc: "Şirket misafirleriniz ve iş ortaklarınız için firmanızın prestijine yakışır karşılama ve transfer." },
                { icon: "fa-suitcase-rolling", title: "Geziler & Etkinlikler", desc: "Düğün, nişan, konser veya turistik gezileriniz için gruplara özel VIP Sprinter araç seçenekleri." }
            ];

            const displayVehicles = vehicles.length > 0 ? vehicles : defaultVehicles;

            if (loading) {
                return (
                    <div className="min-h-screen flex items-center justify-center" style={{backgroundColor:'#0D0E10'}}>
                        <div className="text-center">
                            <i className="fa-solid fa-circle-notch animate-spin text-3xl text-vip-gold mb-3"></i>
                            <p className="font-montserrat tracking-widest text-xs text-vip-muted">YÜKLENİYOR...</p>
                        </div>
                    </div>
                );
            }

            // ── ADMIN GİRİŞ EKRANI ──
            if (view === 'admin-login') {
                const loginBg = appearance.adminLoginBg;
                return (
                    <div className="min-h-screen flex items-center justify-center p-4"
                        style={loginBg ? {backgroundImage:`url(${loginBg})`,backgroundSize:'cover',backgroundPosition:'center'} : {backgroundColor:'#0D0E10'}}>
                        <div className="w-full max-w-md bg-vip-card rounded-2xl p-8 border border-neutral-200/60 premium-shadow">
                            <h2 className="text-xl font-bold font-montserrat text-center text-vip-dark tracking-wide mb-6">YÖNETİCİ GİRİŞİ</h2>
                            {loginError && <div className="bg-red-50 border border-red-200 text-red-600 p-3 rounded-xl text-xs text-center mb-4">{loginError}</div>}
                            <form onSubmit={handleLogin} className="space-y-4">
                                <input type="email" required className="w-full bg-vip-bg border border-neutral-200 rounded-xl px-4 py-3.5 text-sm focus:border-vip-gold focus:ring-0" placeholder="E-Posta" value={loginEmail} onChange={e => setLoginEmail(e.target.value)} />
                                <input type="password" required className="w-full bg-vip-bg border border-neutral-200 rounded-xl px-4 py-3.5 text-sm focus:border-vip-gold focus:ring-0" placeholder="Şifre" value={loginPassword} onChange={e => setLoginPassword(e.target.value)} />
                                <button type="submit" className="w-full bg-vip-dark text-white font-bold py-3.5 rounded-xl text-xs font-montserrat tracking-wider uppercase transition-all mobile-touch-active">GİRİŞ YAP</button>
                            </form>
                        </div>
                    </div>
                );
            }

            // ── ADMİN PANELİ ──
            if (view === 'admin-panel') {
                return (
                    <div className="min-h-screen flex flex-col pb-4" style={{backgroundColor:'#F8F9FA'}}>
                        <header className="bg-vip-card border-b border-neutral-200/60 py-4 px-6 flex justify-between items-center premium-shadow">
                            <div>
                                <h1 className="text-base font-bold font-montserrat text-vip-dark">VIP YÖNETİM PANELİ</h1>
                                <p className="text-[11px] text-vip-muted">{user?.email}</p>
                            </div>
                            <button onClick={handleLogout} className="bg-red-50 text-red-600 border border-red-200 text-xs font-bold px-4 py-2 rounded-xl transition-all">ÇIKIŞ YAP</button>
                        </header>

                        <div className="flex-1 max-w-6xl w-full mx-auto p-4 grid grid-cols-1 md:grid-cols-3 gap-6">

                            {/* SOL KOLON */}
                            <div className="space-y-6">

                                {/* ARKA PLAN GÖRSELLERİ KARTI */}
                                <div className="bg-vip-card rounded-2xl p-6 border border-neutral-200/60 premium-shadow">
                                    <h3 className="text-xs font-bold font-montserrat text-vip-dark uppercase border-b border-neutral-100 pb-3 mb-4">
                                        Arka Plan Görselleri
                                    </h3>
                                    <form onSubmit={saveAppearance} className="space-y-5">

                                        {/* Hero arka planı */}
                                        <div className="space-y-2">
                                            <label className="block text-[11px] text-vip-muted uppercase font-bold tracking-wider">
                                                Ana Sayfa Hero Görseli
                                            </label>
                                            <label className="flex flex-col items-center justify-center w-full h-28 border-2 border-neutral-200 border-dashed rounded-xl cursor-pointer bg-vip-bg hover:border-vip-gold transition-colors overflow-hidden">
                                                {tempHeroBg ? (
                                                    <img src={tempHeroBg} className="w-full h-full object-cover" />
                                                ) : (
                                                    <div className="flex flex-col items-center justify-center text-center p-2">
                                                        <i className={`fa-solid ${uploadingHeroBg ? 'fa-spinner animate-spin' : 'fa-image'} text-xl text-vip-gold mb-1`}></i>
                                                        <p className="text-xs text-vip-dark font-medium">Hero Görseli Seç</p>
                                                        <p className="text-[10px] text-vip-muted">Sitenin üst kapak alanı</p>
                                                    </div>
                                                )}
                                                <input type="file" accept="image/*" className="hidden" onChange={handleHeroBgChange} />
                                            </label>
                                            {tempHeroBg && (
                                                <button type="button" onClick={() => setTempHeroBg('')}
                                                    className="text-[10px] text-red-400 underline">Görseli Kaldır</button>
                                            )}
                                        </div>

                                        {/* Admin giriş arka planı */}
                                        <div className="space-y-2">
                                            <label className="block text-[11px] text-vip-muted uppercase font-bold tracking-wider">
                                                Admin Giriş Arka Planı
                                            </label>
                                            <label className="flex flex-col items-center justify-center w-full h-28 border-2 border-neutral-200 border-dashed rounded-xl cursor-pointer bg-vip-bg hover:border-vip-gold transition-colors overflow-hidden">
                                                {tempAdminBg ? (
                                                    <img src={tempAdminBg} className="w-full h-full object-cover" />
                                                ) : (
                                                    <div className="flex flex-col items-center justify-center text-center p-2">
                                                        <i className={`fa-solid ${uploadingAdminBg ? 'fa-spinner animate-spin' : 'fa-lock'} text-xl text-vip-gold mb-1`}></i>
                                                        <p className="text-xs text-vip-dark font-medium">Admin BG Seç</p>
                                                        <p className="text-[10px] text-vip-muted">Giriş ekranı arka planı</p>
                                                    </div>
                                                )}
                                                <input type="file" accept="image/*" className="hidden" onChange={handleAdminBgChange} />
                                            </label>
                                            {tempAdminBg && (
                                                <button type="button" onClick={() => setTempAdminBg('')}
                                                    className="text-[10px] text-red-400 underline">Görseli Kaldır</button>
                                            )}
                                        </div>

                                        <button type="submit"
                                            className="w-full bg-vip-gold text-white text-xs font-bold py-3 rounded-xl uppercase tracking-wider mobile-touch-active">
                                            GÖRSELLERİ KAYDET (FİREBASE)
                                        </button>
                                    </form>
                                </div>

                                {/* YENİ ARAÇ EKLEME KARTI */}
                                <div className="bg-vip-card rounded-2xl p-6 border border-neutral-200/60 premium-shadow">
                                    <h3 className="text-xs font-bold font-montserrat text-vip-dark uppercase border-b border-neutral-100 pb-3 mb-4">
                                        {editingVehicle ? 'Aracı Düzenle' : 'Yeni Araç Ekle'}
                                    </h3>
                                    <form onSubmit={saveVehicle} className="space-y-4">
                                        <input type="text" required className="w-full bg-vip-bg border border-neutral-200 text-sm rounded-xl px-4 py-2.5 focus:border-vip-gold focus:ring-0" placeholder="Araç Adı" value={vehName} onChange={e => setVehName(e.target.value)} />
                                        <div className="space-y-2">
                                            <label className="block text-[11px] text-vip-muted uppercase font-bold tracking-wider">Araç Fotoğrafı</label>
                                            <label className="flex flex-col items-center justify-center w-full h-32 border-2 border-neutral-200 border-dashed rounded-xl cursor-pointer bg-vip-bg hover:border-vip-gold transition-colors p-2">
                                                {vehImg ? (
                                                    <img src={vehImg} className="w-full h-full object-cover rounded-lg" />
                                                ) : (
                                                    <div className="flex flex-col items-center justify-center text-center">
                                                        <i className={`fa-solid ${uploading ? 'fa-spinner animate-spin' : 'fa-image'} text-xl text-vip-gold mb-1`}></i>
                                                        <p className="text-xs text-vip-dark font-medium">Fotoğraf Yükle</p>
                                                    </div>
                                                )}
                                                <input type="file" accept="image/*" className="hidden" onChange={handleFileChange} />
                                            </label>
                                        </div>
                                        <textarea required rows="4" className="w-full bg-vip-bg border border-neutral-200 text-sm rounded-xl px-4 py-2.5 focus:border-vip-gold focus:ring-0" placeholder="Özellikler (Her satıra bir özellik yazın)" value={vehDesc} onChange={e => setVehDesc(e.target.value)}></textarea>
                                        <button type="submit" className="w-full bg-vip-dark text-white text-xs font-bold py-3 rounded-xl uppercase tracking-wider mobile-touch-active">KAYDET</button>
                                    </form>
                                </div>
                            </div>

                            {/* SAĞ KOLON */}
                            <div className="md:col-span-2 space-y-6">
                                <div className="bg-vip-card rounded-2xl p-6 border border-neutral-200/60 premium-shadow">
                                    <h3 className="text-xs font-bold font-montserrat text-vip-dark uppercase border-b border-neutral-100 pb-3 mb-4">Hızlı İletişim Numaraları</h3>
                                    <form onSubmit={saveContact} className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-[10px] uppercase font-bold text-vip-muted mb-1">Telefon Numarası</label>
                                            <input type="text" className="w-full bg-vip-bg border border-neutral-200 text-sm rounded-xl px-4 py-2.5" value={settings.phone} onChange={e => setSettings({...settings, phone: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-[10px] uppercase font-bold text-vip-muted mb-1">WhatsApp Numarası</label>
                                            <input type="text" className="w-full bg-vip-bg border border-neutral-200 text-sm rounded-xl px-4 py-2.5" value={settings.whatsapp} onChange={e => setSettings({...settings, whatsapp: e.target.value})} />
                                        </div>
                                        <button type="submit" className="sm:col-span-2 bg-vip-gold text-white text-xs font-bold py-2.5 px-4 rounded-xl uppercase mobile-touch-active">NUMARALARI GÜNCELLE</button>
                                    </form>
                                </div>

                                <div className="bg-vip-card rounded-2xl p-6 border border-neutral-200/60 premium-shadow">
                                    <h3 className="text-xs font-bold font-montserrat text-vip-dark uppercase border-b border-neutral-100 pb-3 mb-4">Kayıtlı Araç Filosu ({vehicles.length})</h3>
                                    <div className="space-y-2 max-h-80 overflow-y-auto pr-1">
                                        {vehicles.map(v => (
                                            <div key={v.id} className="flex items-center gap-4 bg-vip-bg p-3 rounded-xl border border-neutral-100">
                                                <img src={v.image} className="w-16 h-12 object-cover rounded-lg bg-neutral-200" />
                                                <div className="flex-1 min-w-0"><h4 className="text-xs font-bold text-vip-dark truncate">{v.name}</h4></div>
                                                <button onClick={() => { setEditingVehicle(v); setVehName(v.name); setVehImg(v.image); setVehDesc(v.description); }} className="p-2 text-vip-gold"><i className="fa-solid fa-pen"></i></button>
